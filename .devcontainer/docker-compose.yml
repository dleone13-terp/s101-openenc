version: '3.8'

volumes:
  postgres-data:

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
        # Ensure that the variables in .env match the same variables in devcontainer.json
        - .env
    volumes:
      - ../..:/workspaces:cached

    # Overrides default command so things don't shut down after the process ends.
    command: sleep infinity

    # Runs app on the same network as the database container, allows "forwardPorts" in devcontainer.json function.
    # network_mode: service:db

    # Use "forwardPorts" in **devcontainer.json** to forward an app port locally. 
    # (Adding the "ports" property to this file will not forward from a Codespace.)

  db:
    image: postgis/postgis:16-3.5
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    env_file:
        - .env

    # Add "forwardPorts": ["5432"] to **devcontainer.json** to forward PostgreSQL locally.
    # (Adding the "ports" property to this file will not forward from a Codespace.)

  martin:
    image: ghcr.io/maplibre/martin
    restart: unless-stopped
    depends_on:
      - db
    env_file:
        - .env
    # Raise the open-file limit so Martin can build sprite sheets from
    # the ~717 SVGs per theme without hitting EMFILE (os error 24).
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    #volumes:
      # Config generated from martin/martin.yaml
      # - ../martin/martin.yaml:/martin.yaml:ro
      # Sprite atlases built by: python -m sprites.build_sprites
      #- ../sprites/out:/sprites:ro
      # Roboto (or other) PBF font shards – place in fonts/ at workspace root
      #- ../fonts:/fonts:ro
      #- ../style/out:/style:ro
    command: --config /martin.yaml --webui enable-for-all

  adminer:
    image: adminer
    restart: unless-stopped
    depends_on:
      - db
    environment:
      - ADMINER_DEFAULT_SERVER=db