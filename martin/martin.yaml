---
# Martin tile server configuration for the S-101 ENC pipeline.
# Reference: https://maplibre.org/martin/config-file.html
#
# This file is mounted into the martin container at /martin.yaml by
# .devcontainer/docker-compose.yml.  Start Martin with:
#   martin --config /martin.yaml --webui enable-for-all
#
# Prerequisites
#   1. Run  psql … < db/schema.sql   to create the enc_* tables.
#   2. Run  python -m sprites.build_sprites  to populate sprites/out/.
#   3. Place Roboto PBF font shards in  fonts/  (see docs/Usage.md).

listen_addresses: "0.0.0.0:3000"

# ── PostGIS source ──────────────────────────────────────────────────────
postgres:
  - connection_string: ${DATABASE_URL}
    # Auto-publish every table whose name starts with "enc_".
    # Requires Martin ≥ 0.13.  Tables are served at:
    #   /{table_name}/{z}/{x}/{y}
    auto_publish:
      tables:
        from_schemas:
          - public
        # id_regex is not supported in Martin v1.3.1 – filter by schema only.
        # Only enc_* tables exist in the public schema, so no further filter needed.

# ── Sprite atlases ──────────────────────────────────────────────────────
# Generated by:  python -m sprites.build_sprites  → sprites/out/<theme>/
# Mounted at /sprites by docker-compose (sprites/out → /sprites).
# Martin serves:
#   /sprites/{key}/sprite.png   /sprites/{key}/sprite@2x.png
#   /sprites/{key}/sprite.json  /sprites/{key}/sprite@2x.json
# Mapbox GL style references the path *without* extension:
#   "sprite": "http://localhost:3000/sprites/day/sprite"
sprites:
  paths:
    - /sprites/Day
    - /sprites/Dusk
    - /sprites/Night

# ── Mapbox GL style JSONs (generated by: python -m style.build_style)
# Mounted at /style by docker-compose (style/out → /style).
# Martin serves:  /style/<style_id>   (e.g. /style/Day, /style/Dusk, /style/Night)
# Use /catalog to list all available style IDs.
styles:
  paths:
    - /style

fonts:
  - /fonts


